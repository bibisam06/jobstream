# JobStream 로컬 인프라
# 실행: docker compose up -d
# 종료: docker compose down        (데이터 유지)
#       docker compose down -v     (데이터까지 초기화)

services:

  # ── Kafka (KRaft 모드 — Zookeeper 없음) ─────────────────────────
  kafka:
    image: apache/kafka:3.8.0
    container_name: jobstream-kafka
    ports:
      - "9092:9092"   # 호스트(내 노트북의 Python 코드)에서 접속하는 포트
    environment:
      # KRaft: 브로커 + 컨트롤러를 한 노드가 겸임 (로컬 개발용 단일 노드)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093

      # 리스너 3개:
      #  - PLAINTEXT(29092)      : 도커 네트워크 내부용 (컨테이너끼리)
      #  - PLAINTEXT_HOST(9092)  : 호스트용 (localhost:9092 로 접속)
      #  - CONTROLLER(29093)     : KRaft 컨트롤러 통신용
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://kafka:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      # 단일 노드라 복제 계수 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      # 개발 편의: 토픽 자동 생성 허용 (운영에선 false 권장 — ADR 거리)
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ── Kafka UI (토픽/메시지 눈으로 확인 — 학습에 큰 도움) ─────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: jobstream-kafka-ui
    ports:
      - "8080:8080"   # http://localhost:8080
    environment:
      KAFKA_CLUSTERS_0_NAME: jobstream-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy

  # ── Redis (dedup / rate limiter) ────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: jobstream-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes   # 재시작해도 dedup 상태 유지
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── PostgreSQL (+pgvector — 2개월차 벡터 검색 대비 미리 포함) ──
  postgres:
    image: pgvector/pgvector:pg16
    container_name: jobstream-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jobstream}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jobstream-dev}   # .env 로 덮어쓰기
      POSTGRES_DB: ${POSTGRES_DB:-jobstream}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jobstream}"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  kafka-data:
  redis-data:
  postgres-data: